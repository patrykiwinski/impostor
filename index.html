<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprezowe Gry Gry</title>
    <style>
        /* Reset i podstawowe style */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Kontener menu */
        .menu-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            background: #1a1a1e;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #29292e;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 1px;
        }

        p {
            color: #87868b;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Styl linków / przycisków */
        .button-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            display: block;
            text-decoration: none;
            color: #fff;
            background: #202024;
            padding: 16px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease-in-out;
            border: 1px solid #323238;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        /* Efekty po najechaniu (Hover) */
        .menu-btn:hover {
            background: #00adb5;
            border-color: #00adb5;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 173, 181, 0.3);
        }

        .menu-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Wybierz Grę</h1>
        <p>Wybierz tryb i zacznij zabawę</p>
        
        <div class="button-list">
            <a href="spy.html" class="menu-btn">🕵️‍♂️ Spy / Impostor</a>
            <a href="kolo.html" class="menu-btn">🎡 Koło / Spectrum</a>
            <a href="kolo2.html" class="menu-btn">🦆 Koło / Spectrum(fizyczne)</a>
        </div>
    </div>

</body>
</html>
